<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Wellness Medicals</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #d5f5f0 0%, #f0fdfa 50%, #ccfbf1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0,80,70,0.08);
      padding: 48px;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(13,148,136,0.10);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .icon .material-icons-round { font-size: 36px; color: #0D9488; }
    h1 {
      font-family: 'Manrope', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #191c1e;
      margin-bottom: 8px;
    }
    p {
      color: #3d4947;
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #0D9488; color: #fff; border: none;
      border-radius: 12px; padding: 12px 24px;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(13,148,136,0.30);
      text-decoration: none;
    }
    .btn:hover { background: #00685f; transform: translateY(-1px); }
    .btn .material-icons-round { font-size: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><span class="material-icons-round">wifi_off</span></div>
    <h1>You're Offline</h1>
    <p>Wellness Medicals Admin is running in offline mode.<br/>Some features may be limited until your connection is restored.</p>
    <button class="btn" onclick="window.location.reload()">
      <span class="material-icons-round">refresh</span> Try Again
    </button>
  </div>
</body>
</html>
