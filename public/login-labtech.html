<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lab Portal – Wellness Medicals</title>
  <link rel="icon" type="image/jpeg" href="assets/hms-logo.jpg">
  <meta name="description" content="Secure lab technician login for Wellness Medicals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
  <style>.portal-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(225,29,72,0.1); color:#E11D48; padding:4px 12px; border-radius:99px; font-size:0.75rem; font-weight:700; margin-bottom:12px; }</style>
</head>
<body class="login-body" data-expected-role="Lab Tech">
  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-container">
    <div class="brand-panel">
      <div class="brand-logo">
        <img src="assets/hms-logo.jpg" alt="Wellness Medicals Logo" class="logo-icon" />
      </div>
      <h1 class="brand-name">Wellness Medicals</h1>
      <p class="brand-tagline">Laboratory Portal</p>
    </div>

    <div class="form-panel glass-card">
      <div class="form-header">
        <div class="portal-badge"><span class="material-icons-round" style="font-size:16px">biotech</span> Lab Access</div>
        <h2>Welcome back</h2>
        <p>Sign in to manage lab operations</p>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <div class="form-group">
          <label for="email">Lab Technician Email</label>
          <div class="input-wrapper">
            <span class="material-icons-round input-icon">alternate_email</span>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="material-icons-round input-icon">lock</span>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
              <span class="material-icons-round" id="pwIcon">visibility</span>
            </button>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" />
            <span class="checkmark"></span>Remember me
          </label>
          <a href="#" class="forgot-link" id="forgotPwLink">Forgot password?</a>
        </div>

        <div class="error-msg" id="errorMsg" aria-live="polite"></div>

        <button type="submit" class="btn-primary btn-login" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="material-icons-round btn-arrow">arrow_forward</span>
          <div class="btn-loader" id="btnLoader"></div>
        </button>
      </form>

      <p class="login-footer">
        <a href="/">← Back to Portal Selection</a>
      </p>
    </div>
  </div>

  <script type="module" src="js/firebase-init.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
